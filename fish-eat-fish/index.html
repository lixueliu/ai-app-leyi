<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>鱼吃鱼小游戏</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #001a33; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
        #tip {
            position: fixed; top: 20px; left: 20px;
            color: #fff; font-size: 18px; font-family: sans-serif;
            z-index: 99;
        }
        #gameOver {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff; padding: 40px 60px;
            text-align: center; font-size: 24px;
            display: none; border-radius: 12px;
        }
        #restart {
            margin-top: 20px; padding: 10px 30px;
            font-size: 18px; cursor: pointer;
            background: #00aaff; border: none; color: white;
            border-radius: 6px;
        }
    </style>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffe56f'/%3E%3Cpath d='M20 32h24M32 20v24' stroke='%23172033' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>
    <div id="tip">分数：0 | 体型：1级</div>
    <div id="gameOver">
        <div id="overText">游戏结束</div>
        <button id="restart">重新开始</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const tipText = document.getElementById('tip');
        const gameOverBox = document.getElementById('gameOver');
        const overText = document.getElementById('overText');
        const restartBtn = document.getElementById('restart');

        // 画布自适应窗口
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 游戏全局变量
        let gameOver = false;
        let score = 0;
        let player;
        let fishList = [];
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        // 鱼类类
        class Fish {
            constructor(x, y, size, color, speedX, speedY, isPlayer = false) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.speedX = speedX;
                this.speedY = speedY;
                this.isPlayer = isPlayer;
                this.wave = 0; // 尾巴摆动动画
            }

            // 绘制鱼
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                this.wave += 0.1;
                const tailOffset = Math.sin(this.wave) * 4;

                // 鱼身体椭圆
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();

                // 鱼尾
                ctx.beginPath();
                ctx.moveTo(-this.size, -this.size * 0.4);
                ctx.lineTo(-this.size - this.size * 0.6, tailOffset);
                ctx.lineTo(-this.size, this.size * 0.4);
                ctx.closePath();
                ctx.fill();

                // 鱼眼睛
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.size * 0.5, -this.size * 0.2, this.size * 0.18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.size * 0.55, -this.size * 0.2, this.size * 0.08, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // AI鱼自动游动 + 边界反弹
            updateAI() {
                this.x += this.speedX;
                this.y += this.speedY;
                // 碰到墙壁反向
                if (this.x < this.size || this.x > canvas.width - this.size) this.speedX *= -1;
                if (this.y < this.size || this.y > canvas.height - this.size) this.speedY *= -1;
            }

            // 碰撞检测
            isCollide(target) {
                const dx = this.x - target.x;
                const dy = this.y - target.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return dist < this.size + target.size;
            }
        }

        // 生成随机AI鱼
        function createFish(num = 15) {
            fishList = [];
            for (let i = 0; i < num; i++) {
                const size = Math.random() * 25 + 8;
                const x = Math.random() * (canvas.width - 60) + 30;
                const y = Math.random() * (canvas.height - 60) + 30;
                const spX = (Math.random() - 0.5) * 1.2;
                const spY = (Math.random() - 0.5) * 1.2;
                const color = `hsl(${Math.random() * 360}, 85%, 60%)`;
                fishList.push(new Fish(x, y, size, color, spX, spY));
            }
        }

        // 初始化玩家
        function initPlayer() {
            player = new Fish(canvas.width / 2, canvas.height / 2, 12, '#00ddff', 0, 0, true);
        }

        // 刷新UI文字
        function updateUI() {
            const level = Math.floor(player.size / 10);
            tipText.textContent = `分数：${score} | 体型：${level}级`;
        }

        // 碰撞逻辑处理
        function handleCollision() {
            for (let i = fishList.length - 1; i >= 0; i--) {
                const fish = fishList[i];
                if (player.isCollide(fish)) {
                    if (player.size > fish.size) {
                        // 吃掉小鱼，加分长大
                        score += Math.floor(fish.size);
                        player.size += 1.2;
                        fishList.splice(i, 1);
                        // 吃完补充新鱼
                        if (fishList.length < 12) {
                            const s = Math.random() * 25 + 8;
                            fishList.push(new Fish(Math.random()*canvas.width, Math.random()*canvas.height, s, `hsl(${Math.random()*360},85%,60%)`, (Math.random()-0.5)*1.2, (Math.random()-0.5)*1.2));
                        }
                    } else {
                        // 被大鱼吃掉，游戏结束
                        gameOver = true;
                        overText.innerText = `你被大鱼吃掉了！最终得分：${score}`;
                        gameOverBox.style.display = 'block';
                    }
                }
            }
            // 胜利判定：体型足够大通关
            if (player.size > 60) {
                gameOver = true;
                overText.innerText = `恭喜通关！最终得分：${score}`;
                gameOverBox.style.display = 'block';
            }
        }

        // 游戏主循环
        function gameLoop() {
            if (gameOver) return;
            // 绘制深海渐变背景
            const grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0, '#002b55');
            grad.addColorStop(1, '#000f22');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 绘制气泡装饰
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            for(let i=0;i<8;i++){
                ctx.beginPath();
                ctx.arc((i*120+Date.now()*0.02)%canvas.width, (i*90)%canvas.height, 2+i%4, 0, Math.PI*2);
                ctx.fill();
            }

            // 玩家跟随鼠标移动
            const moveSpeed = 0.08;
            player.x += (mouseX - player.x) * moveSpeed;
            player.y += (mouseY - player.y) * moveSpeed;
            player.draw();

            // 更新并绘制所有AI鱼
            fishList.forEach(fish => {
                fish.updateAI();
                fish.draw();
            });

            handleCollision();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // 鼠标监听
        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // 重启游戏
        function restartGame() {
            gameOver = false;
            score = 0;
            gameOverBox.style.display = 'none';
            createFish();
            initPlayer();
            gameLoop();
        }
        restartBtn.addEventListener('click', restartGame);

        // 启动游戏
        createFish();
        initPlayer();
        gameLoop();
    </script>

<style id="leyi-home-link-style">
  .leyi-home-link {
    position: fixed;
    left: 14px;
    top: 14px;
    z-index: 99999;
    padding: 8px 12px;
    border: 2px solid #172033;
    border-radius: 999px;
    background: #fffdf6;
    color: #172033;
    box-shadow: 3px 3px 0 #172033;
    font: 700 14px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-decoration: none;
  }
  .leyi-home-link:focus-visible { outline: 3px solid #ffe56f; outline-offset: 2px; }
</style>
<a class="leyi-home-link" href="../" aria-label="返回 AI 小游戏乐园">返回乐园</a>
</body>
</html>

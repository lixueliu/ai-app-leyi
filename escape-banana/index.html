<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>逃离大香蕉</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑"}
body{
    background: #e9e9e9;
    background-image: linear-gradient(#dddddd 1px, transparent 1px),
                      linear-gradient(90deg, #dddddd 1px, transparent 1px);
    background-size: 30px 30px;
    min-height: 100vh;
    padding: 30px;
}
.container{
    max-width: 750px;
    margin: 0 auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 2px 12px #bbbbbb;
    text-align: center;
}
.title{
    font-size: 32px;
    color: #333333;
    margin-bottom: 15px;
}
#gameCanvas{
    border: 3px solid #777;
    background: #f7f7f7;
    cursor: none;
}
.info-bar{
    font-size: 22px;
    color: #444;
    margin: 12px 0;
}
.start-btn{
    padding: 12px 40px;
    font-size: 22px;
    background: #ffc107;
    color: #222;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
    font-weight:bold;
}
.start-btn:hover{
    background: #ffb300;
}
.tips{
    font-size: 17px;
    color: #555;
    margin-top: 10px;
    line-height: 1.6;
}
</style>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffe56f'/%3E%3Cpath d='M20 32h24M32 20v24' stroke='%23172033' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>
<div class="container">
    <h1 class="title">🍌 逃离大香蕉</h1>
    <div class="info-bar">存活时间：<span id="scoreText">0</span>秒</div>
    <canvas id="gameCanvas" width="680" height="420"></canvas>
    <button class="start-btn" id="startBtn">点击开始游戏</button>
    <p class="tips">鼠标操控白色小人<br>1.蓝色安全房间：大香蕉无法进入；房内10秒无敌，出房间无敌立刻消失<br>2.房间停留满10秒生成炮台，子弹击中香蕉/变红单位全部变回逃生者<br>3.存活满30秒还有人存活，直接玩家胜利；全员被抓大香蕉获胜<br>4.所有角色不能跑出画布；蓝AI、小黄狗看见大香蕉会逃跑<br>5.小黄狗清除香蕉分身；被香蕉抓到变恶犬抓人；香蕉定时生成分身追击</p>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("scoreText");
const startBtn = document.getElementById("startBtn");
const W = canvas.width;
const H = canvas.height;

let gameRunning = false;
let score = 0;
let scoreTimer;
let cloneTimer = 0;
let frameCount = 0;
let bulletList = [];
const winFrame = 1800;

const rooms = [
    {x:20,y:20,w:130,h:100,stayTimer:0,hasTurret:false},
    {x:530,y:20,w:130,h:100,stayTimer:0,hasTurret:false},
    {x:20,y:300,w:130,h:100,stayTimer:0,hasTurret:false},
    {x:530,y:300,w:130,h:100,stayTimer:0,hasTurret:false}
];

const turrets = rooms.map(r=>({
    x: r.x + r.w/2,
    y: r.y + r.h/2,
    fireCd:0
}));

function pointInRoom(px,py,size,room){
    const half = size/2;
    return px-half > room.x && px+half < room.x+room.w
        && py-half > room.y && py+half < room.y+room.h;
}

function clampEntity(entity) {
    const half = entity.size / 2;
    if (entity.x < half) entity.x = half;
    if (entity.x > W - half) entity.x = W - half;
    if (entity.y < half) entity.y = half;
    if (entity.y > H - half) entity.y = H - half;
}

function blockRoomForBanana(hunter){
    const half = hunter.size / 2;
    for(let r of rooms){
        if(hunter.x-half < r.x+r.w && hunter.x+half > r.x && hunter.y-half < r.y+r.h && hunter.y+half > r.y){
            const centerX = r.x + r.w/2;
            const centerY = r.y + r.h/2;
            const dx = hunter.x - centerX;
            const dy = hunter.y - centerY;
            const len = Math.hypot(dx,dy);
            hunter.x += dx / len * 3;
            hunter.y += dy / len * 3;
        }
    }
}

const player = {
    x: 340,
    y: 210,
    size: 24,
    isCaught: false,
    safeTimer: 0
};

let aiPlayers = [
    { x: 100, y: 100, size: 22, speed: 5, dx: 0, dy: 0, changeTimer: 0, isCaught: false, safeTimer:0 },
    { x: 580, y: 90, size: 22, speed: 5, dx: 0, dy: 0, changeTimer: 0, isCaught: false, safeTimer:0 },
    { x: 120, y: 330, size: 22, speed: 5, dx: 0, dy: 0, changeTimer: 0, isCaught: false, safeTimer:0 }
];

const bigBanana = {
    x: 60,
    y: 60,
    size: 44,
    speed: 1.6,
    eyeAngle: 0
};

let bananaClones = [];

const dog = {
    x: 450,
    y: 300,
    size: 20,
    speed: 2.8,
    dx: 0,
    dy: 0,
    changeTimer: 0,
    isEvil: false
};

canvas.addEventListener("mousemove", e => {
    if (!gameRunning) return;
    const rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left;
    player.y = e.clientY - rect.top;
    clampEntity(player);
});

function drawHuman(x, y, size, color, safe) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y - size/2, size/3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.moveTo(x, y - size/6);
    ctx.lineTo(x, y + size/3);
    ctx.moveTo(x - size/2, y);
    ctx.lineTo(x + size/2, y);
    ctx.moveTo(x, y + size/3);
    ctx.lineTo(x - size/3, y + size/2);
    ctx.moveTo(x, y + size/3);
    ctx.lineTo(x + size/3, y + size/2);
    ctx.stroke();
    if(safe>0){
        ctx.strokeStyle="#00ff00";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(x,y,size/2+6,0,Math.PI*2);
        ctx.stroke();
    }
}

function drawBananaMonster(x, y, size, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    ctx.fillStyle="#ffdd00";
    ctx.beginPath();
    ctx.ellipse(0,0, size, size*0.55, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle="#ccaa00";
    ctx.lineWidth=3;
    ctx.stroke();

    ctx.fillStyle="#997700";
    ctx.fillRect(size-8, -6, 14, 12);

    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(-12, -8, 6, 0, Math.PI*2);
    ctx.arc(12, -8, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#000";
    ctx.beginPath();
    ctx.arc(-12, -8, 3, 0, Math.PI*2);
    ctx.arc(12, -8, 3, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#222";
    ctx.beginPath();
    ctx.ellipse(0, 12, 14, 9, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.moveTo(-8,12);
    ctx.lineTo(-4,16);
    ctx.lineTo(0,12);
    ctx.lineTo(4,16);
    ctx.lineTo(8,12);
    ctx.fill();

    ctx.restore();
}

function drawDog(x, y, size, evil) {
    if (evil) {
        ctx.fillStyle = "#990000";
        ctx.shadowColor = "#ff0000";
        ctx.shadowBlur = 8;
    } else {
        ctx.fillStyle = "#ffcc33";
        ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.ellipse(x, y, size, size * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x - size * 0.8, y - size * 0.6, size * 0.4, size * 0.6, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + size * 0.8, y - size * 0.6, size * 0.4, size * 0.6, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = evil ? "#ff2222" : "#000";
    ctx.beginPath();
    ctx.arc(x - size * 0.4, y - size * 0.2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + size * 0.4, y - size * 0.2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = evil ? "#ff2222" : "#000";
    ctx.lineWidth = 2;
    if (evil) {
        ctx.beginPath();
        ctx.arc(x, y + size * 0.4, 5, Math.PI + 0.2, -0.2);
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.arc(x, y + size * 0.4, 5, 0.2, Math.PI - 0.2);
        ctx.stroke();
    }
    ctx.shadowBlur = 0;
}

function drawRooms(){
    ctx.fillStyle="#e8f4ff";
    ctx.strokeStyle="#2277dd";
    ctx.lineWidth=3;
    for(let r of rooms){
        ctx.fillRect(r.x,r.y,r.w,r.h);
        ctx.strokeRect(r.x,r.y,r.w,r.h);
        ctx.fillStyle="#2277dd";
        ctx.font="14px 微软雅黑";
        ctx.fillText("安全房间",r.x+10,r.y+25);
        if(r.hasTurret){
            ctx.fillText("已生成炮台",r.x+10,r.y+45);
        }
    }
}

function drawTurrets(){
    rooms.forEach((r,idx)=>{
        if(!r.hasTurret) return;
        const t = turrets[idx];
        ctx.fillStyle="#666666";
        ctx.beginPath();
        ctx.arc(t.x,t.y,12,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle="#ff7700";
        ctx.fillRect(t.x-2,t.y-15,4,16);
    });
}

function drawBullets(){
    ctx.fillStyle="#ffdd00";
    bulletList.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,4,0,Math.PI*2);
        ctx.fill();
    });
}

function getAllBananas() {
    return [bigBanana, ...bananaClones];
}

function getMinBananaDis(tarX, tarY) {
    const list = getAllBananas();
    let min = Infinity;
    list.forEach(b => {
        const d = Math.hypot(b.x - tarX, b.y - tarY);
        if (d < min) min = d;
    });
    return min;
}

function refreshAIDir(ai) {
    const angle = Math.random() * Math.PI * 2;
    ai.dx = Math.cos(angle);
    ai.dy = Math.sin(angle);
}

function refreshDogDir() {
    const angle = Math.random() * Math.PI * 2;
    dog.dx = Math.cos(angle);
    dog.dy = Math.sin(angle);
}

function updateAI(ai) {
    if (ai.isCaught) return;
    const disBanana = getMinBananaDis(ai.x, ai.y);
    ai.changeTimer++;

    let inAnyRoom = false;
    for(let r of rooms){
        if(pointInRoom(ai.x,ai.y,ai.size,r)) inAnyRoom=true;
    }

    if(inAnyRoom){
        ai.safeTimer=600;
    }else{
        ai.safeTimer=0;
    }

    if (disBanana < 180) {
        let avgX = 0, avgY = 0;
        getAllBananas().forEach(b => { avgX += b.x; avgY += b.y; });
        avgX /= getAllBananas().length;
        avgY /= getAllBananas().length;
        const escapeRad = Math.atan2(ai.y - avgY, ai.x - avgX);
        ai.dx = Math.cos(escapeRad);
        ai.dy = Math.sin(escapeRad);
        ai.changeTimer = 0;
    } else if (ai.changeTimer > 60) {
        refreshAIDir(ai);
        ai.changeTimer = 0;
    }

    ai.x += ai.dx * ai.speed;
    ai.y += ai.dy * ai.speed;
    clampEntity(ai);
}

function updateDog() {
    dog.changeTimer++;
    if (dog.isEvil) {
        const alive = getAliveList();
        if (alive.length > 0) {
            let minD = Infinity, t = alive[0];
            alive.forEach(p => {
                const d = Math.hypot(p.x - dog.x, p.y - dog.y);
                if (d < minD) { minD = d; t = p; }
            });
            const dx = t.x - dog.x;
            const dy = t.y - dog.y;
            const len = Math.hypot(dx, dy);
            dog.dx = dx / len;
            dog.dy = dy / len;
        }
    } else {
        const disBanana = getMinBananaDis(dog.x, dog.y);
        if (disBanana < 180) {
            let avgX = 0, avgY = 0;
            getAllBananas().forEach(b => { avgX += b.x; avgY += b.y; });
            avgX /= getAllBananas().length;
            avgY /= getAllBananas().length;
            const escapeRad = Math.atan2(dog.y - avgY, dog.x - avgX);
            dog.dx = Math.cos(escapeRad);
            dog.dy = Math.sin(escapeRad);
            dog.changeTimer = 0;
        } else if (dog.changeTimer > 80) {
            refreshDogDir();
            dog.changeTimer = 0;
        }
    }
    dog.x += dog.dx * dog.speed;
    dog.y += dog.dy * dog.speed;
    clampEntity(dog);
}

function getAliveList() {
    let arr = [];
    if (!player.isCaught) arr.push(player);
    aiPlayers.forEach(ai => { if (!ai.isCaught) arr.push(ai); });
    return arr;
}

function findNearestAlive(huntX, huntY) {
    const alive = getAliveList();
    if (alive.length === 0) return null;
    let minDis = Infinity;
    let target = alive[0];
    alive.forEach(p => {
        const d = Math.hypot(p.x - huntX, p.y - huntY);
        if (d < minDis) { minDis = d; target = p; }
    });
    return target;
}

function findNearestBanana(fromX,fromY){
    const list = getAllBananas();
    if(list.length===0) return null;
    let minD=Infinity,tar=list[0];
    list.forEach(b=>{
        const d=Math.hypot(b.x-fromX,b.y-fromY);
        if(d<minD){minD=d;tar=b;}
    });
    return tar;
}

function hitCheck(x1, y1, s1, x2, y2, s2) {
    const dis = Math.hypot(x1 - x2, y1 - y2);
    return dis < (s1 + s2) / 2;
}

function countCaughtTotal() {
    let cnt = 0;
    if (player.isCaught) cnt++;
    aiPlayers.forEach(ai => { if (ai.isCaught) cnt++; });
    return cnt;
}

function drawInitialScreen(){
    ctx.clearRect(0,0,W,H);
    drawRooms();
    drawTurrets();
    drawBullets();

    aiPlayers.forEach(ai => {
        if (!ai.isCaught) drawHuman(ai.x, ai.y, ai.size, "#2266dd", ai.safeTimer);
    });

    if (!player.isCaught) {
        drawHuman(player.x, player.y, player.size, "#fff", player.safeTimer);
    } else {
        drawBananaMonster(player.x, player.y, player.size, 0);
    }

    drawDog(dog.x, dog.y, dog.size, dog.isEvil);
    drawBananaMonster(bigBanana.x, bigBanana.y, bigBanana.size, bigBanana.eyeAngle);

    bananaClones.forEach((bc, idx) => {
        drawBananaMonster(bc.x, bc.y, bc.size, bc.eyeAngle);
    });
}

function gameLoop() {
    if (!gameRunning) return;

    ctx.clearRect(0, 0, W, H);
    frameCount++;
    cloneTimer++;

    if(frameCount >= winFrame){
        const caughtNum = countCaughtTotal();
        if(caughtNum < 4){
            gameRunning = false;
            clearInterval(scoreTimer);
            alert(`游戏结束！玩家胜利！\n成功坚持30秒，躲过了大香蕉，存活：${score}秒`);
            startBtn.style.display = "block";
            return;
        }
    }

    const playerInRoom = rooms.some(r => pointInRoom(player.x,player.y,player.size,r));
    if(playerInRoom){
        player.safeTimer=600;
        rooms.forEach(r=>{
            if(pointInRoom(player.x,player.y,player.size,r)){
                r.stayTimer++;
                if(r.stayTimer >= 600) r.hasTurret = true;
            }
        });
    }else{
        player.safeTimer=0;
        rooms.forEach(r=>r.stayTimer=0);
    }

    aiPlayers.forEach(ai => updateAI(ai));
    updateDog();

    if (cloneTimer >= 200) {
        cloneTimer = 0;
        getAllBananas().forEach(b => {
            const newClone = {
                x: b.x + (Math.random() - 0.5) * 30,
                y: b.y + (Math.random() - 0.5) * 30,
                size: 30,
                speed: 1.4,
                eyeAngle: Math.random()*Math.PI
            };
            clampEntity(newClone);
            blockRoomForBanana(newClone);
            bananaClones.push(newClone);
        });
    }

    getAllBananas().forEach(banana => {
        const tar = findNearestAlive(banana.x, banana.y);
        if (tar) {
            if (banana.x < tar.x) banana.x += banana.speed;
            if (banana.x > tar.x) banana.x -= banana.speed;
            if (banana.y < tar.y) banana.y += banana.speed;
            if (banana.y > tar.y) banana.y -= banana.speed;
        }
        banana.eyeAngle += 0.015;
        clampEntity(banana);
        blockRoomForBanana(banana);
    });

    rooms.forEach((r,idx)=>{
        if(!r.hasTurret) return;
        const t = turrets[idx];
        t.fireCd--;
        if(t.fireCd <= 0){
            const targetBanana = findNearestBanana(t.x,t.y);
            if(targetBanana){
                const dx=targetBanana.x - t.x;
                const dy=targetBanana.y - t.y;
                const len=Math.hypot(dx,dy);
                bulletList.push({
                    x:t.x,
                    y:t.y,
                    vx:dx/len*6,
                    vy:dy/len*6,
                    life:120
                });
                t.fireCd=40;
            }
        }
    });

    for(let i=bulletList.length-1;i>=0;i--){
        const b=bulletList[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
        if(b.life<=0 || b.x<0||b.x>W||b.y<0||b.y>H){
            bulletList.splice(i,1);
            continue;
        }

        if(hitCheck(b.x,b.y,4,bigBanana.x,bigBanana.y,bigBanana.size)){
            bulletList.splice(i,1);
            player.isCaught=false;
            continue;
        }

        let hitClone = false;
        for(let j=bananaClones.length-1;j>=0;j--){
            const bc=bananaClones[j];
            if(hitCheck(b.x,b.y,4,bc.x,bc.y,bc.size)){
                bulletList.splice(i,1);
                bananaClones.splice(j,1);
                hitClone = true;
                break;
            }
        }
        if(hitClone) continue;

        if(player.isCaught && hitCheck(b.x,b.y,4,player.x,player.y,player.size)){
            bulletList.splice(i,1);
            player.isCaught=false;
            break;
        }

        aiPlayers.forEach(ai=>{
            if(ai.isCaught && hitCheck(b.x,b.y,4,ai.x,ai.y,ai.size)){
                ai.isCaught=false;
                bulletList.splice(i,1);
            }
        });

        if(dog.isEvil && hitCheck(b.x,b.y,4,dog.x,dog.y,dog.size)){
            dog.isEvil=false;
            bulletList.splice(i,1);
        }
    }

    if (!dog.isEvil) {
        for (let i = bananaClones.length - 1; i >= 0; i--) {
            const bc = bananaClones[i];
            if (hitCheck(dog.x, dog.y, dog.size, bc.x, bc.y, bc.size)) {
                bananaClones.splice(i, 1);
            }
        }

        if (player.isCaught && hitCheck(dog.x, dog.y, dog.size, player.x, player.y, player.size)) {
            player.isCaught = false;
        }

        aiPlayers.forEach(ai => {
            if (ai.isCaught && hitCheck(dog.x, dog.y, dog.size, ai.x, ai.y, ai.size)) {
                ai.isCaught = false;
            }
        });
    }

    getAllBananas().forEach(b => {
        if (!dog.isEvil && hitCheck(b.x, b.y, b.size, dog.x, dog.y, dog.size)) {
            dog.isEvil = true;
        }
    });

    if (dog.isEvil) {
        if (!player.isCaught && player.safeTimer<=0 && hitCheck(dog.x, dog.y, dog.size, player.x, player.y, player.size)) {
            player.isCaught = true;
            const newB = {x:player.x,y:player.y,size:30,speed:1.4,eyeAngle:0};
            clampEntity(newB);
            blockRoomForBanana(newB);
            bananaClones.push(newB);
        }

        aiPlayers.forEach(ai => {
            if (!ai.isCaught && ai.safeTimer<=0 && hitCheck(dog.x, dog.y, dog.size, ai.x, ai.y, ai.size)) {
                ai.isCaught = true;
                const newB = {x:ai.x,y:ai.y,size:30,speed:1.4,eyeAngle:0};
                clampEntity(newB);
                blockRoomForBanana(newB);
                bananaClones.push(newB);
            }
        });
    }

    getAllBananas().forEach(banana => {
        if (!player.isCaught && player.safeTimer<=0 && hitCheck(banana.x, banana.y, banana.size, player.x, player.y, player.size)) {
            player.isCaught = true;
            const newB = {x:player.x,y:player.y,size:30,speed:1.4,eyeAngle:0};
            clampEntity(newB);
            blockRoomForBanana(newB);
            bananaClones.push(newB);
        }

        aiPlayers.forEach(ai => {
            if (!ai.isCaught && ai.safeTimer<=0 && hitCheck(banana.x, banana.y, banana.size, ai.x, ai.y, ai.size)) {
                ai.isCaught = true;
                const newB = {x:ai.x,y:ai.y,size:30,speed:1.4,eyeAngle:0};
                clampEntity(newB);
                blockRoomForBanana(newB);
                bananaClones.push(newB);
            }
        });
    });

    drawRooms();
    drawTurrets();
    drawBullets();

    aiPlayers.forEach(ai => {
        if (!ai.isCaught) drawHuman(ai.x, ai.y, ai.size, "#2266dd", ai.safeTimer);
    });

    if (!player.isCaught) {
        drawHuman(player.x, player.y, player.size, "#fff", player.safeTimer);
    } else {
        drawBananaMonster(player.x, player.y, player.size, 0);
    }

    drawDog(dog.x, dog.y, dog.size, dog.isEvil);
    drawBananaMonster(bigBanana.x, bigBanana.y, bigBanana.size, bigBanana.eyeAngle);

    bananaClones.forEach((bc, idx) => {
        drawBananaMonster(bc.x, bc.y, bc.size, bc.eyeAngle);
    });

    const caughtNum = countCaughtTotal();

    if (caughtNum >= 4) {
        gameRunning = false;
        clearInterval(scoreTimer);
        alert(`游戏结束！大香蕉胜利，你失败了！\n所有人都被香蕉抓住，存活：${score}秒`);
        startBtn.style.display = "block";
        return;
    }

    requestAnimationFrame(gameLoop);
}

startBtn.onclick = function () {
    gameRunning = true;
    score = 0;
    cloneTimer = 0;
    frameCount=0;
    bulletList=[];
    bananaClones=[];
    scoreText.innerText = score;

    rooms.forEach(r=>{
        r.stayTimer = 0;
        r.hasTurret = false;
    });
    turrets.forEach(t=>t.fireCd=0);

    player.x = 340;
    player.y = 210;
    player.isCaught = false;
    player.safeTimer=0;
    clampEntity(player);

    aiPlayers = [
        { x: 100, y: 100, size: 22, speed: 5, dx: 0, dy: 0, changeTimer: 0, isCaught: false, safeTimer:0 },
        { x: 580, y: 90, size: 22, speed: 5, dx: 0, dy: 0, changeTimer: 0, isCaught: false, safeTimer:0 },
        { x: 120, y: 330, size: 22, speed: 5, dx: 0, dy: 0, changeTimer: 0, isCaught: false, safeTimer:0 }
    ];
    aiPlayers.forEach(a => {
        refreshAIDir(a);
        clampEntity(a);
    });

    bigBanana.x = 60;
    bigBanana.y = 60;
    clampEntity(bigBanana);
    blockRoomForBanana(bigBanana);
    bananaClones = [];

    dog.x = 450;
    dog.y = 300;
    dog.isEvil = false;
    refreshDogDir();
    clampEntity(dog);

    startBtn.style.display = "none";

    scoreTimer = setInterval(() => {
        score += 1;
        scoreText.innerText = score;
    }, 1000);

    gameLoop();
};

drawInitialScreen();
</script>

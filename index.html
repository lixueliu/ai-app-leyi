<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 小游戏乐园</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ffe56f'/%3E%3Cpath d='M20 32h24M32 20v24' stroke='%23172033' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: light;
        --sky: #bde7ff;
        --mint: #a8f0d0;
        --lemon: #ffe56f;
        --coral: #ff7f7f;
        --violet: #8c7cff;
        --ink: #172033;
        --muted: #667085;
        --panel: #fffdf6;
        --line: #23283a;
        --soft-line: rgba(23, 32, 51, 0.16);
        --shadow: 8px 8px 0 #23283a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(23, 32, 51, 0.05) 1px, transparent 1px),
          linear-gradient(rgba(23, 32, 51, 0.05) 1px, transparent 1px),
          linear-gradient(135deg, #fff7c7 0%, #dff8ff 42%, #f1e7ff 100%);
        background-size: 26px 26px, 26px 26px, auto;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(45deg, transparent 0 46%, rgba(255, 127, 127, 0.5) 46% 54%, transparent 54%),
          linear-gradient(-45deg, transparent 0 46%, rgba(140, 124, 255, 0.36) 46% 54%, transparent 54%);
        background-position:
          right 46px top 34px,
          left 38px bottom 62px;
        background-repeat: no-repeat;
        background-size:
          92px 92px,
          78px 78px;
        content: "";
      }

      main {
        position: relative;
        width: min(1140px, calc(100% - 40px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .topbar {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        color: inherit;
        font-weight: 900;
        text-decoration: none;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border: 3px solid var(--line);
        border-radius: 8px;
        background: var(--lemon);
        box-shadow: 4px 4px 0 var(--line);
      }

      .brand-mark::before {
        width: 16px;
        height: 16px;
        background:
          linear-gradient(var(--line) 0 0) center / 100% 4px no-repeat,
          linear-gradient(var(--line) 0 0) center / 4px 100% no-repeat;
        content: "";
      }

      .branch-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 6px 12px;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        box-shadow: 3px 3px 0 var(--line);
        color: var(--ink);
        font-size: 0.86rem;
        font-weight: 800;
        white-space: nowrap;
      }

      .branch-pill::before {
        width: 10px;
        height: 10px;
        border: 2px solid var(--line);
        border-radius: 50%;
        background: var(--mint);
        content: "";
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.14fr) minmax(280px, 0.86fr);
        gap: 24px;
        align-items: center;
      }

      .hero-copy {
        min-width: 0;
      }

      .label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 18px;
        padding: 9px 12px;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 4px 4px 0 var(--line);
        color: #7a2f00;
        font-size: 0.82rem;
        font-weight: 900;
      }

      .label::before {
        width: 16px;
        height: 16px;
        background:
          linear-gradient(90deg, var(--coral) 50%, transparent 0) 0 0 / 8px 8px,
          linear-gradient(90deg, transparent 50%, var(--violet) 0) 0 8px / 8px 8px;
        content: "";
      }

      h1 {
        max-width: 680px;
        margin: 0;
        font-size: clamp(2.45rem, 5.8vw, 5rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .summary {
        max-width: 660px;
        margin: 18px 0 0;
        color: #344054;
        font-size: clamp(0.98rem, 1.7vw, 1.12rem);
        font-weight: 650;
        line-height: 1.75;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        max-width: 680px;
        margin-top: 20px;
      }

      .stat {
        min-height: 72px;
        padding: 12px;
        border: 3px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 5px 5px 0 var(--line);
      }

      .stat:nth-child(2) {
        background: #e9fff5;
      }

      .stat:nth-child(3) {
        background: #f1edff;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 850;
      }

      .stat strong {
        display: block;
        margin-top: 8px;
        font-size: clamp(1rem, 2vw, 1.22rem);
        line-height: 1.2;
      }

      .arcade {
        position: relative;
        min-height: 282px;
        padding: 18px;
        border: 4px solid var(--line);
        border-radius: 8px;
        background: #ffec8b;
        box-shadow: var(--shadow);
      }

      .arcade::before,
      .arcade::after {
        position: absolute;
        top: 18px;
        width: 18px;
        height: 18px;
        border: 3px solid var(--line);
        border-radius: 50%;
        content: "";
      }

      .arcade::before {
        right: 54px;
        background: var(--coral);
      }

      .arcade::after {
        right: 24px;
        background: var(--mint);
      }

      .screen {
        height: 150px;
        overflow: hidden;
        position: relative;
        border: 4px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.12) 2px, transparent 2px),
          linear-gradient(135deg, #24304f 0%, #111827 100%);
        background-size: 100% 18px, auto;
      }

      .screen-title {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 2;
        width: min(220px, calc(100% - 40px));
        color: #ffffff;
        font-size: clamp(1.18rem, 2.8vw, 1.7rem);
        font-weight: 950;
        line-height: 1.05;
      }

      .pixel {
        position: absolute;
        width: 36px;
        height: 36px;
        border: 3px solid #ffffff;
        border-radius: 6px;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.16);
      }

      .pixel.one {
        right: 42px;
        top: 58px;
        background: var(--mint);
      }

      .pixel.two {
        right: 106px;
        bottom: 54px;
        background: var(--coral);
      }

      .pixel.three {
        left: 56px;
        bottom: 42px;
        background: var(--lemon);
      }

      .track {
        position: absolute;
        right: 34px;
        bottom: 18px;
        left: 34px;
        height: 14px;
        border: 2px solid #ffffff;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
      }

      .avatar {
        position: absolute;
        right: 54px;
        bottom: 38px;
        width: 58px;
        height: 58px;
        border: 4px solid #ffffff;
        border-radius: 12px;
        background: #8c7cff;
        box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.32);
      }

      .avatar::before,
      .avatar::after {
        position: absolute;
        top: 19px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ffffff;
        content: "";
      }

      .avatar::before {
        left: 17px;
      }

      .avatar::after {
        right: 17px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: center;
        padding-top: 16px;
      }

      .dpad {
        width: 74px;
        height: 74px;
        position: relative;
      }

      .dpad::before,
      .dpad::after {
        position: absolute;
        inset: 0;
        margin: auto;
        border: 3px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        content: "";
      }

      .dpad::before {
        width: 28px;
        height: 74px;
      }

      .dpad::after {
        width: 74px;
        height: 28px;
      }

      .buttons {
        display: flex;
        gap: 14px;
      }

      .button {
        width: 48px;
        height: 48px;
        border: 3px solid var(--line);
        border-radius: 50%;
        box-shadow: 4px 4px 0 var(--line);
      }

      .button.a {
        background: var(--coral);
      }

      .button.b {
        background: var(--violet);
      }

      .shelf-heading {
        display: flex;
        gap: 16px;
        align-items: end;
        justify-content: space-between;
        margin: 36px 0 12px;
      }

      .shelf-heading h2 {
        margin: 0;
        font-size: clamp(1.65rem, 3.2vw, 2.35rem);
      }

      .game-count {
        min-width: 54px;
        min-height: 40px;
        display: inline-grid;
        place-items: center;
        border: 3px solid var(--line);
        border-radius: 8px;
        background: var(--mint);
        box-shadow: 4px 4px 0 var(--line);
        font-weight: 950;
      }

      .shelf-note {
        max-width: 720px;
        margin: 0 0 24px;
        color: #475467;
        font-size: 0.98rem;
        font-weight: 650;
        line-height: 1.7;
      }

      .category-section {
        margin-top: 30px;
      }

      .category-list {
        display: grid;
        gap: 8px;
      }

      .category-head {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .category-title {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0;
        font-size: clamp(1.18rem, 2vw, 1.52rem);
      }

      .category-title::before {
        width: 18px;
        height: 18px;
        border: 3px solid var(--line);
        border-radius: 6px;
        background: var(--category-color, var(--lemon));
        box-shadow: 3px 3px 0 var(--line);
        content: "";
      }

      .category-count {
        padding: 6px 10px;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: #ffffff;
        color: #344054;
        font-size: 0.78rem;
        font-weight: 900;
        white-space: nowrap;
      }

      .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 18px;
      }

      .game-card,
      .empty-slot {
        min-height: 318px;
        border: 3px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 6px 6px 0 var(--line);
      }

      .game-card {
        display: grid;
        grid-template-rows: 148px 1fr;
        overflow: hidden;
        color: inherit;
        text-decoration: none;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease;
      }

      .game-card:hover,
      .game-card:focus-visible {
        transform: translate(-2px, -2px);
        box-shadow: 10px 10px 0 var(--line);
        outline: 0;
      }

      .game-card:hover .game-icon,
      .game-card:focus-visible .game-icon {
        transform: translateY(-4px) rotate(-2deg);
      }

      .game-art {
        position: relative;
        border-bottom: 3px solid var(--line);
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.26) 1px, transparent 1px),
          linear-gradient(rgba(255, 255, 255, 0.26) 1px, transparent 1px),
          var(--card-color, var(--sky));
        background-size: 18px 18px, 18px 18px, auto;
      }

      .game-art::before {
        position: absolute;
        right: 18px;
        bottom: 17px;
        left: 18px;
        height: 16px;
        border: 3px solid rgba(23, 32, 51, 0.82);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        content: "";
      }

      .game-art::after {
        position: absolute;
        right: 20px;
        top: 18px;
        width: 48px;
        height: 24px;
        border: 3px solid var(--line);
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 4px 4px 0 rgba(23, 32, 51, 0.18);
        content: "";
      }

      .game-icon {
        position: absolute;
        left: 22px;
        bottom: 32px;
        z-index: 1;
        width: 84px;
        height: 84px;
        display: grid;
        place-items: center;
        border: 4px solid var(--line);
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 7px 7px 0 rgba(23, 32, 51, 0.28);
        color: var(--line);
        font-size: 1.35rem;
        font-weight: 950;
        letter-spacing: 0;
        transition: transform 160ms ease;
      }

      .game-icon::before,
      .game-icon::after {
        position: absolute;
        border: 3px solid var(--line);
        content: "";
      }

      .game-icon::before {
        right: -14px;
        top: -14px;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: var(--lemon);
      }

      .game-icon::after {
        left: -12px;
        bottom: -12px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--mint);
      }

      .game-icon span {
        position: relative;
        z-index: 1;
      }

      .icon-code {
        background: #e0f2fe;
      }

      .icon-math {
        background: #dcfce7;
      }

      .icon-math::before {
        border-radius: 50%;
      }

      .icon-poem {
        background: #fef3c7;
      }

      .icon-poem::after {
        border-radius: 4px;
        background: #fca5a5;
      }

      .icon-wolf-quiz,
      .icon-wolf-game,
      .icon-wolf-role {
        background: #ede9fe;
      }

      .icon-wolf-quiz::before,
      .icon-wolf-game::before,
      .icon-wolf-role::before {
        transform: rotate(45deg);
        border-radius: 4px;
        background: #c4b5fd;
      }

      .icon-wolf-game::after {
        background: #fca5a5;
      }

      .icon-wolf-role::after {
        border-radius: 5px;
        background: #fde68a;
      }

      .icon-beast {
        background: #fed7aa;
      }

      .icon-beast::after {
        width: 30px;
        border-radius: 8px;
        background: #fdba74;
      }

      .icon-detective {
        background: #d9f99d;
      }

      .icon-detective::before {
        width: 34px;
        border-radius: 999px;
        background: #ffffff;
      }

      .icon-chat {
        background: #cffafe;
      }

      .icon-chat::after {
        border-radius: 4px 4px 12px 4px;
        background: #67e8f9;
      }

      .icon-teach {
        background: #fef9c3;
      }

      .icon-teach::before {
        width: 36px;
        height: 22px;
        border-radius: 4px;
      }

      .icon-run,
      .icon-stick,
      .icon-banana,
      .icon-fish,
      .icon-school {
        background: #e0f2fe;
      }

      .icon-run::before,
      .icon-stick::before {
        border-radius: 50%;
        background: #fca5a5;
      }

      .icon-stick::after {
        border-radius: 5px;
        background: #f9a8d4;
      }

      .icon-banana {
        background: #fef08a;
      }

      .icon-banana::before {
        width: 34px;
        height: 18px;
        border-radius: 999px 999px 999px 4px;
        background: #fde047;
      }

      .icon-fish {
        background: #ccfbf1;
      }

      .icon-fish::before {
        width: 34px;
        height: 22px;
        border-radius: 999px;
        background: #5eead4;
      }

      .icon-school {
        background: #e9d5ff;
      }

      .icon-school::before {
        border-radius: 4px;
        background: #ffffff;
      }

      .icon-school::after {
        border-radius: 5px;
        background: #c4b5fd;
      }

      .game-body {
        display: grid;
        gap: 18px;
        align-content: space-between;
        padding: 18px;
      }

      .game-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .chip {
        padding: 5px 8px;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: #ffffff;
        color: #344054;
        font-size: 0.76rem;
        font-weight: 850;
      }

      .chip-index {
        background: #fff7ed;
      }

      .game-title {
        margin: 0;
        font-size: 1.18rem;
        line-height: 1.25;
      }

      .game-desc {
        margin: 9px 0 0;
        color: var(--muted);
        font-size: 0.94rem;
        font-weight: 600;
        line-height: 1.55;
      }

      .play-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #274065;
        font-size: 0.92rem;
        font-weight: 950;
      }

      .play-line span:last-child {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border: 2px solid var(--line);
        border-radius: 50%;
        background: var(--lemon);
      }

      .empty-slot {
        display: grid;
        min-height: 252px;
        padding: 20px;
        background:
          linear-gradient(90deg, transparent 0 46%, rgba(23, 32, 51, 0.08) 46% 54%, transparent 54%),
          #ffffff;
      }

      .empty-content {
        display: grid;
        place-items: center;
        align-self: stretch;
        border: 3px dashed rgba(23, 32, 51, 0.38);
        border-radius: 8px;
        color: #475467;
        text-align: center;
      }

      .empty-content strong {
        display: block;
        margin-bottom: 8px;
        color: var(--ink);
        font-size: 1.12rem;
      }

      @media (max-width: 860px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .arcade {
          min-height: auto;
        }
      }

      @media (max-width: 620px) {
        main {
          width: min(100% - 28px, 1140px);
          padding-top: 26px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .stats {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 8px;
        }

        .stat {
          min-height: 64px;
          padding: 10px;
        }

        .stat strong {
          font-size: 0.95rem;
        }

        .arcade {
          display: none;
        }

        .shelf-heading {
          align-items: center;
          margin-top: 42px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <a class="brand" href="./" aria-label="AI 小游戏乐园首页">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>AI 小游戏乐园</span>
        </a>
        <span class="branch-pill">main</span>
      </header>

      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="label">Lele x Doubao</p>
          <h1 id="page-title">AI 小游戏乐园</h1>
          <p class="summary">
            这里是乐乐和豆包一起做出来的小游戏展柜。每张卡片都是一个可以直接打开的作品：
            有答题闯关、身份推理、故事互动，也有跑酷和躲避挑战。
          </p>

          <div class="stats" aria-label="项目概览">
            <div class="stat">
              <span>作者</span>
              <strong>乐乐 x 豆包</strong>
            </div>
            <div class="stat">
              <span>作品</span>
              <strong>15 个小游戏</strong>
            </div>
            <div class="stat">
              <span>入口</span>
              <strong>点卡片开始</strong>
            </div>
          </div>
        </div>

        <div class="arcade" aria-hidden="true">
          <div class="screen">
            <div class="screen-title">打开小游戏</div>
            <span class="pixel one"></span>
            <span class="pixel two"></span>
            <span class="pixel three"></span>
            <span class="avatar"></span>
            <span class="track"></span>
          </div>
          <div class="controls">
            <span class="dpad"></span>
            <span class="buttons">
              <span class="button a"></span>
              <span class="button b"></span>
            </span>
          </div>
        </div>
      </section>

      <section aria-labelledby="games-title">
        <div class="shelf-heading">
          <h2 id="games-title">游戏作品</h2>
          <span class="game-count" id="game-count">0</span>
        </div>
        <p class="shelf-note">
          按玩法分好类了。挑一张喜欢的卡片点进去，就能开始试玩乐乐的 AI 小游戏。
        </p>
        <div class="category-list" id="game-grid"></div>
      </section>
    </main>

    <script>
      const games = [
        {
          name: "编程猫知识闯关",
          folder: "coding-cat-quest",
          category: "学习闯关",
          icon: "code",
          mark: "CODE",
          creator: "乐乐 x 豆包",
          type: "知识闯关",
          description: "用 30 道题学习编程猫、积木、舞台和循环基础。",
          color: "#bde7ff",
        },
        {

      const grid = document.querySelector("#game-grid");
      const count = document.querySelector("#game-count");

      count.textContent = games.length;

      function createChip(text) {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = text;
        return chip;
      }

      function createGameCard(game, index) {
        const colors = ["#bde7ff", "#a8f0d0", "#ffe56f", "#ffb0d2", "#c9b7ff"];
        const href = `${game.folder.replace(/\/$/, "")}/`;
        const card = document.createElement("a");
        card.className = "game-card";
        card.href = href;
        card.style.setProperty("--card-color", game.color || colors[index % colors.length]);
        card.setAttribute("aria-label", `打开 ${game.name}`);

        const art = document.createElement("div");
        art.className = "game-art";

        const icon = document.createElement("div");
        icon.className = `game-icon icon-${game.icon || "code"}`;
        const iconText = document.createElement("span");
        iconText.textContent = game.mark || game.name.slice(0, 1);
        icon.append(iconText);
        art.append(icon);

        const body = document.createElement("div");
        body.className = "game-body";

        const copy = document.createElement("div");
        const meta = document.createElement("div");
        meta.className = "game-meta";
        const indexChip = createChip(`作品 ${String(index + 1).padStart(2, "0")}`);
        indexChip.classList.add("chip-index");
        meta.append(createChip(game.type || "小游戏"), indexChip);

        const title = document.createElement("h3");
        title.className = "game-title";
        title.textContent = game.name;

        const desc = document.createElement("p");
        desc.className = "game-desc";
        desc.textContent = game.description || href;

        const play = document.createElement("div");
        play.className = "play-line";
        const playText = document.createElement("span");
        playText.textContent = "开始游戏";
        const playArrow = document.createElement("span");
        playArrow.setAttribute("aria-hidden", "true");
        playArrow.textContent = ">";
        play.append(playText, playArrow);

        copy.append(meta, title, desc);
        body.append(copy, play);
        card.append(art, body);
        return card;
      }

      if (games.length === 0) {
        const slot = document.createElement("div");
        slot.className = "empty-slot";
        slot.innerHTML = `
          <div class="empty-content">
            <p>
              <strong>第一个小游戏位已经准备好</strong>
              作品放进来后，这里会亮起入口卡片。
            </p>
          </div>
        `;
        grid.append(slot);
      } else {
        const categoryOrder = ["学习闯关", "身份推理", "故事互动", "动作挑战"];
        const categoryColors = {
          学习闯关: "#ffe56f",
          身份推理: "#c9b7ff",
          故事互动: "#a8f0d0",
          动作挑战: "#ff7f7f",
        };
        const fragment = document.createDocumentFragment();

        categoryOrder.forEach((category) => {
          const categoryGames = games.filter((game) => game.category === category);
          if (categoryGames.length === 0) return;

          const section = document.createElement("section");
          section.className = "category-section";
          section.style.setProperty("--category-color", categoryColors[category]);
          section.setAttribute("aria-labelledby", `category-${category}`);

          const head = document.createElement("div");
          head.className = "category-head";

          const title = document.createElement("h3");
          title.className = "category-title";
          title.id = `category-${category}`;
          title.textContent = category;

          const total = document.createElement("span");
          total.className = "category-count";
          total.textContent = `${categoryGames.length} 个作品`;

          const list = document.createElement("div");
          list.className = "game-grid";

          categoryGames.forEach((game) => list.append(createGameCard(game, games.indexOf(game))));

          head.append(title, total);
          section.append(head, list);
          fragment.append(section);
        });

        grid.replaceChildren(fragment);
      }
    </script>
